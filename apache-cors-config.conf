# Configuración de Apache para el backend con CORS
# Coloca esto en tu archivo .htaccess o en la configuración del VirtualHost

<IfModule mod_headers.c>
    # Habilitar CORS para el frontend
    Header always set Access-Control-Allow-Origin "https://administracionweb.netlify.app"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
    Header always set Access-Control-Allow-Credentials "true"
    Header always set Access-Control-Max-Age "86400"
    
    # Manejar OPTIONS requests (preflight)
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=204,L]
</IfModule>

# Proxy al backend Node.js
<IfModule mod_proxy.c>
    ProxyPreserveHost On
    ProxyPass /backendanalis/ http://localhost:3000/
    ProxyPassReverse /backendanalis/ http://localhost:3000/
</IfModule>
