# Configuración de NGINX para el backend con CORS
# Coloca esto en tu archivo de configuración de nginx

location /backendanalis/ {
    # Proxy pass al backend Node.js
    proxy_pass http://localhost:3000/;
    
    # Headers básicos de proxy
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    
    # IMPORTANTE: Pasar el Origin header al backend
    proxy_set_header Origin $http_origin;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Manejar OPTIONS requests (preflight) directamente en nginx
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'https://administracionweb.netlify.app' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' 86400 always;
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
    }
    
    # Agregar headers CORS a todas las respuestas
    add_header 'Access-Control-Allow-Origin' 'https://administracionweb.netlify.app' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
}
