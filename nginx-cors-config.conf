# ============================================================
# nginx-cors-config.conf
# Configuración NGINX para backend con CORS dinámico
# VPS: rifaslsv.com | Frontend: administracionweb.netlify.app
# ============================================================
#
# INSTRUCCIONES PARA APLICAR EN EL VPS:
# 1. Copia el bloque location en tu archivo nginx:
#    sudo nano /etc/nginx/sites-available/rifaslsv.com
# 2. Recarga nginx: sudo nginx -t && sudo systemctl reload nginx
# 3. Reinicia el backend: pm2 restart all (o el gestor que uses)
# ============================================================

location /backendanalis/ {

    # ── Proxy pass al backend Node.js ──────────────────────
    proxy_pass http://localhost:3000/;

    # Headers básicos del proxy
    proxy_http_version 1.1;
    proxy_set_header Upgrade        $http_upgrade;
    proxy_set_header Connection     'upgrade';
    proxy_set_header Host           $host;
    proxy_set_header Origin         $http_origin;
    proxy_set_header X-Real-IP      $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # ── CORS: OPTIONS preflight ─────────────────────────────
    # IMPORTANTE: en nginx, el bloque 'if' dentro de location
    # retorna ANTES de hacer el proxy_pass, por eso hay que
    # manejar OPTIONS aquí para que el browser no espere.
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin'      $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Requested-With' always;
        add_header 'Access-Control-Max-Age'           86400        always;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    # ── CORS: todas las demás respuestas ────────────────────
    # El backend Node.js ya añade estos headers (via cors()),
    # pero los añadimos aquí también como seguro de respaldo.
    add_header 'Access-Control-Allow-Origin'      $http_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;
}
